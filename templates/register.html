<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aman — Inscription</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ── DARK MODE (défaut) ── */
    :root {
      --green: #00e676;
      --green-dim: #00c853;
      --bg: #040d07;
      --card: #081410;
      --border: #0d2a1a;
      --text: #e8f5e9;
      --muted: #4a7c5e;
    }

    /* ── LIGHT MODE ── */
    body.light {
      --bg: #f8fafc;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
    }

    body.light .card {
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04), 0 20px 60px rgba(0, 0, 0, 0.05);
    }

    body.light::before {
      background: radial-gradient(ellipse 60% 50% at 20% 50%, rgba(0, 230, 118, 0.04) 0%, transparent 60%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 20% 50%, rgba(0, 230, 118, 0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0, 230, 118, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 230, 118, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 1;
      animation: fadeUp .6s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      font-size: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: rgba(0, 230, 118, 0.1);
      margin: 0 auto 12px;
      color: var(--green);
      filter: drop-shadow(0 0 20px rgba(0, 230, 118, 0.4));
    }

    .logo h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: var(--green);
    }

    .logo p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 0 60px rgba(0, 230, 118, 0.04), 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input {
      width: 100%;
      background: rgba(0, 230, 118, 0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      transition: border-color .2s;
      outline: none;
    }

    input:focus {
      border-color: rgba(0, 230, 118, 0.4);
      box-shadow: 0 0 0 3px rgba(0, 230, 118, 0.08);
    }

    input::placeholder {
      color: var(--muted);
    }

    .btn {
      width: 100%;
      padding: 13px;
      background: var(--green);
      color: #040d07;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(0, 230, 118, 0.25);
    }

    .btn:hover {
      background: var(--green-dim);
      transform: translateY(-1px);
    }

    .error {
      background: rgba(255, 82, 82, 0.1);
      border: 1px solid rgba(255, 82, 82, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      color: #ff5252;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--muted);
    }

    .link a {
      color: var(--green);
      text-decoration: none;
      font-weight: 500;
    }

    /* Theme toggle */
    .theme-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      width: 36px;
      height: 36px;
      border-radius: 9px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .theme-btn:hover {
      border-color: var(--green);
      color: var(--green);
    }
  </style>
</head>

<body>
  <button class="theme-btn" onclick="toggleTheme()" title="Changer de thème"><i class="fa-solid fa-moon"
      id="theme-icon"></i></button>
  <div class="grid-bg"></div>
  <div class="container">
    <div class="logo">
      <div class="logo-icon"><i class="fa-solid fa-seedling"></i></div>
      <h1>Aman</h1>
      <p>Créer votre compte</p>
    </div>
    <div class="card">
      <h2>Inscription</h2>
      {% if error %}<div class="error">{{ error }}</div>{% endif %}
      <form method="POST">
        <div class="form-group">
          <label>Nom complet</label>
          <input type="text" name="name" placeholder="Ahmed Benali" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="votre@email.com" required>
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Créer mon compte →</button>
      </form>
    </div>
    <div class="link">Déjà un compte ? <a href="/login">Se connecter</a></div>
  </div>
</body>
<script>
  function applyTheme(m) {
    const icon = document.getElementById('theme-icon');
    if (m === 'light') { document.body.classList.add('light'); icon.className = 'fa-solid fa-sun'; }
    else { document.body.classList.remove('light'); icon.className = 'fa-solid fa-moon'; }
    localStorage.setItem('aman-theme', m);
  }
  function toggleTheme() { applyTheme(document.body.classList.contains('light') ? 'dark' : 'light'); }
  (function () {
    const s = localStorage.getItem('aman-theme');
    if (s) applyTheme(s);
    else if (window.matchMedia('(prefers-color-scheme: light)').matches) applyTheme('light');
  })();
</script>

</html>
